name: Prettier Formatting

permissions:
  contents: read

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  check-format:
    name: Check Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11
      - name: Install dependencies
        run: |
          pnpm ci
      - name: Run prettier
        run: |
          pnpm run format
          git --no-pager diff --exit-code --color=never
